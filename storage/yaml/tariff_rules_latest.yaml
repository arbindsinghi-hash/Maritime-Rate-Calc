# -----------------------------------------------------------------------------
# Definitions — shared across all sections
# -----------------------------------------------------------------------------
definitions:
  tonnage:
    convention: "Tonnage Convention 1969"
    unit: "gross_tonnage"
    convert_to_cubic_metres: false
    conversion_factor: 2.83
    fallback_source: "Lloyds Register of Shipping (highest tonnage)"
    include_cargo_mass: false

  vessel_types:
    - id: coaster
      description: "Bona fide coaster — vessel carrying cargo exclusively between SA ports on regular schedule; requires Authority approval"
    - id: passenger_vessel
      description: "Vessel carrying more than 12 passengers"
      passenger_threshold: 12
    - id: small_vessel
      description: "Commercial small vessel; includes tug, fishing vessel, launch, barge, lighter; excludes pleasure vessel"
    - id: pleasure_vessel
      description: "Solely for sports and recreation, not more than 12 passengers"
    - id: fishing_vessel
      description: "Used for catching fish/living resources for gain; licensed by Dept of Environmental Affairs & Tourism"
    - id: tanker
      description: "Designed to carry liquid cargo in bulk (crude, petroleum, LPG)"
    - id: hulk
      description: "Hulk — decommissioned vessel for breaking up"
    - id: bulk_carrier
      description: "Vessel designed to carry dry bulk cargo"

  unit_of_tonnage_cargo:
    unit: "metric_ton"
    min_quantity: 1
    exceptions:
      - commodity_type: "vehicle"
        unit: "metre"
        description: "Motor vehicles on own wheels charged per metre of length"
      - commodity_type: "bulk_liquid"
        unit: "kilolitre"
        description: "Bulk liquids measured in kilolitres"

  working_hours:
    default:
      description: "24 hours — Richards Bay, Durban, Ngqura, Port Elizabeth, Cape Town, Saldanha"
      days: "all"
      start: "00:01"
      end: "24:00"
    mossel_bay:
      description: "Mondays to Fridays excluding public holidays: 06:00–18:00"
      days: "Mon-Fri"
      start: "06:00"
      end: "18:00"
    east_london:
      description: "Weekdays 06:00–22:00; Saturdays 06:00–12:00"
      days: "Mon-Sat"
      start: "06:00"
      end: "22:00"
      saturdays:
        start: "06:00"
        end: "12:00"

# =============================================================================
# Sections — one per charge category, in evaluation order
# =============================================================================
sections:

  # ===========================================================================
  # 1. LIGHT DUES (Section 1.1, Page 5)
  # ===========================================================================
  - id: light_dues
    name: "Light Dues"
    description: >
      Light dues on vessels entering SA waters. Two regimes: (1) registered vessels
      at their registered port — per metre LOA per financial year; (2) all other
      vessels — per 100 GT, valid from first to last SA port of call.
    citation:
      page: 5
      section: "1.1"
    applicability:
      payable_by:
        - "vessel_owner"
        - "vessel_agent"
      scope: "all_sa_ports"
    calculation:
      type: multiple_regimes
      regimes:
        - id: registered_port
          applies_to:
            - "self_propelled"
            - "deat_licensed_at_registered_port"
          basis: "loa_metres"
          period: "financial_year"
          rate_per_metre: 24.64
          validity: "per financial year or part thereof"
        - id: all_other_vessels
          applies_to:
            - "all_other"
          basis: "gross_tonnage"
          divisor: 100
          rate_per_100_tons: 117.08
          validity: "first SA port of call to last SA port of call"
          conditions:
            - "does_not_proceed_beyond_sa_coastline"
            - "time_in_sa_waters_not_exceeding_60_days"
          time_limits_days: 60
          territorial_limits_nm: 12
          coastal_after_days: 60
          coastal_basis: "calendar_month"
    exemptions:
      - id: full_exemption
        conditions:
          - "saps_sandf"
        description: "SAPS and SANDF vessels"
      - id: samsa_exemption
        conditions:
          - "samsa"
        description: "SAMSA vessels"
      - id: medical_research_exemption
        conditions:
          - "sa_medical_research"
        description: "SA Medical & Research vessels"
      - id: non_selfpropelled_small_pleasure
        conditions:
          - "non_self_propelled_small_pleasure_not_gain"
        description: "Non-self-propelled small and pleasure vessels not used for gain"
      - id: anchorage_outside_port
        conditions:
          - "anchorage_outside_port"
        description: "Vessels at anchorage outside port (except single buoy mooring)"
    note: "Coaster Light Dues raised on monthly basis per special agreement. From foreign port: full Light Dues at first SA port."

  # ===========================================================================
  # 2. VTS CHARGES (Section 2.1, Page 6)
  # ===========================================================================
  - id: vts_charges
    name: "VTS Dues"
    description: >
      Vessel Traffic Services charges per GT per port call. Higher rate at
      Durban and Saldanha Bay. Minimum fee applies.
    citation:
      page: 6
      section: "2.1"
    applicability:
      payable_by:
        - "vessel_owner"
        - "vessel_agent"
      conditions:
        - "vessel_calling_port_under_authority_control"
      scope: "all_sa_ports"
    calculation:
      type: per_unit
      basis: "gross_tonnage"
      rate_per_gt: 0.54
      per: "port_call"
      port_overrides:
        durban:
          rate_per_gt: 0.65
        saldanha:
          rate_per_gt: 0.65
    minimum_fee: 235.52
    exemptions:
      - conditions: ["saps_sandf"]
      - conditions: ["samsa"]
      - conditions: ["sa_medical_research"]
      - conditions: ["return_from_anchorage_harbour_master_order"]
      - conditions: ["section_4_2_small_pleasure"]

  # ===========================================================================
  # 3. MARINE SERVICES INCENTIVE (Section 3.2, Page 6)
  # ===========================================================================
  - id: marine_services_incentive
    name: "Marine Services Incentive"
    description: >
      Threshold-based discount on pilotage, craft assistance and berthing
      services. Applied per shipping line on a national basis to cargo-working
      vessels only.
    citation:
      page: 6
      section: "3.2"
    applicability:
      payable_by:
        - "shipping_line"
      scope: "per_shipping_line_national_all_ports"
      cargo_working_vessels_only: true
    calculation:
      type: threshold_discount
      applies_to_charges:
        - "pilotage"
        - "tugs_assistance"
        - "berthing_services"
      tiers:
        - cargo_type: "CONTAINER"
          threshold_calls: 500
          discount_pct_per_increment: 1
          increment_calls: 50
          max_calls_for_discount: 1500
        - cargo_type: "AUTO_CARRIERS"
          threshold_calls: 100
          discount_pct_per_increment: 1
          increment_calls: 10
          max_calls_for_discount: 300
        - cargo_type: "BREAK_BULK"
          threshold_calls: 100
          discount_pct_per_increment: 1
          increment_calls: 10
          max_calls_for_discount: 300
        - cargo_type: "DRY_BULK"
          threshold_calls: 100
          discount_pct_per_increment: 1
          increment_calls: 10
          max_calls_for_discount: 300
        - cargo_type: "LIQUID_BULK"
          threshold_calls: 100
          discount_pct_per_increment: 1
          increment_calls: 10
          max_calls_for_discount: 300

