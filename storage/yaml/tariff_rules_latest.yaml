  - id: port_dues
    name: "Port Dues"
    description: >
      Port fees: base per 100 GT plus incremental per 100 GT per 24h (pro rata).
      Multiple reductions with stacking rules. Surcharge after 30 days
      non-cargo-working.
    citation:
      page: 11
      section: "4.1.1"
    applicability:
      payable_by:
        - "vessel_owner"
        - "vessel_agent"
      conditions:
        - "vessel_entering_port"
        - "vessel_taking_bunkers_at_designated_anchorage"
        - "vessel_at_offshore_moorings"
      scope: "all_sa_ports"
    calculation:
      type: per_unit_per_time
      basis: "gross_tonnage"
      divisor: 100
      base_rate_per_100_tons: 192.73
      incremental_rate_per_100_tons_per_24h: 57.79
      period: "24_hours"
      period_rounding: "pro_rata"
    minimum_fee_small_pleasure_other_than_registered: 470.98
    reductions:
